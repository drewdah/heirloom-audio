# Redirect HTTP to HTTPS, except for ACME challenge
server {
    listen 80;
    server_name heirloomaudioapp.com www.heirloomaudioapp.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to Next.js app
server {
    listen 443 ssl;
    server_name heirloomaudioapp.com www.heirloomaudioapp.com;

    ssl_certificate     /etc/letsencrypt/live/heirloomaudioapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heirloomaudioapp.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 500M;

    # Tell browsers to always use HTTPS for this domain (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
