version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: heirloom-audio
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: file:/data/db/heirloom.db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      REDIS_URL: redis://redis:6379
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      UPLOAD_DIR: /data/uploads
    volumes:
      - ./data/db:/data/db
      - ./data/uploads:/data/uploads
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  whisper-worker:
    build:
      context: ./whisper-worker
      dockerfile: Dockerfile
    container_name: heirloom-whisper
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      REDIS_URL: redis://redis:6379
      UPLOAD_PATH: /data/uploads
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      # In full docker compose: app container is at http://app:3000
      # In hybrid dev mode (npm run dev + docker compose up redis whisper-worker):
      #   set APP_URL=http://host.docker.internal:3000 in your .env
      APP_URL: ${APP_URL:-http://app:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - ./data/uploads:/data/uploads
      # Mount public/takes so worker can read locally-saved take files in dev
      - ./public/takes:/app/public/takes
      - ./public/exports:/app/public/exports
      - whisper-models:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 3G

  redis:
    image: redis:7-alpine
    container_name: heirloom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  whisper-models:
