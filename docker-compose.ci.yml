# docker-compose.ci.yml — override for CI and local E2E testing
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
#
# Key differences from the default:
#  - Replaces bind mounts with Docker volumes (avoids permission issues in CI)
#  - Enables the /api/test/seed endpoint via ENABLE_TEST_SEED
#  - Disables Google Drive and Whisper worker

services:
  app:
    ports:
      - "3000:3000"
    environment:
      ENABLE_TEST_SEED: "true"
      SKIP_DRIVE: "true"
      ALLOWED_EMAILS: ""
      WHISPER_ENABLED: "false"
    volumes:
      - ci-db:/data/db
      - ci-uploads:/data/uploads
      - ci-covers:/app/public/covers
      - ci-takes:/app/public/takes
      - ci-exports:/app/public/exports
    healthcheck:
      interval: 5s
      timeout: 5s
      retries: 12

  nginx:
    deploy:
      replicas: 0

  certbot:
    deploy:
      replicas: 0

  whisper-worker:
    profiles:
      - whisper
    deploy:
      replicas: 0

volumes:
  ci-db:
  ci-uploads:
  ci-covers:
  ci-takes:
  ci-exports:
