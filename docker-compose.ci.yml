# docker-compose.ci.yml — override for CI
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

services:
  app:
    environment:
      NODE_ENV: test
      SKIP_DRIVE: "true"
      ALLOWED_EMAILS: ""
      WHISPER_ENABLED: "false"
    healthcheck:
      interval: 5s
      timeout: 5s
      retries: 12

  whisper-worker:
    profiles:
      - whisper
    deploy:
      replicas: 0
