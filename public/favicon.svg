<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue rounded square background -->
  <rect width="32" height="32" rx="7" fill="#3a7bd5"/>
  <!-- Mic body capsule -->
  <rect x="11" y="3" width="10" height="14" rx="5" fill="white" fill-opacity="0.95"/>
  <!-- Grille lines -->
  <line x1="11" y1="8" x2="21" y2="8" stroke="#3a7bd5" stroke-width="1.2"/>
  <line x1="11" y1="11" x2="21" y2="11" stroke="#3a7bd5" stroke-width="1.2"/>
  <line x1="11" y1="14" x2="21" y2="14" stroke="#3a7bd5" stroke-width="1.2"/>
  <!-- Neck -->
  <rect x="14.5" y="17" width="3" height="3" fill="white" fill-opacity="0.8"/>
  <!-- Stand arm -->
  <path d="M9 20.5 Q16 24 23 20.5" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Stand pole -->
  <line x1="16" y1="23" x2="16" y2="28" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Base foot -->
  <line x1="11" y1="28" x2="21" y2="28" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>
