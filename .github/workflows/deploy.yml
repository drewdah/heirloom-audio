name: Deploy

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (e.g. v1.2.3 or latest)'
        required: true
        default: 'latest'

env:
  APP_IMAGE: ghcr.io/${{ github.repository }}/app
  WORKER_IMAGE: ghcr.io/${{ github.repository }}/whisper-worker

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Build & push app
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.APP_IMAGE }}:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build & push whisper-worker
        uses: docker/build-push-action@v6
        with:
          context: ./whisper-worker
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.WORKER_IMAGE }}:latest
          cache-from: type=gha,scope=whisper
          cache-to: type=gha,mode=max,scope=whisper

  deploy:
    name: Deploy to Droplet
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Pull & restart services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            if ! docker compose version &>/dev/null; then
              apt-get install -y docker-compose-plugin
            fi
            if [ -d /opt/heirloom-audio/.git ]; then
              git -C /opt/heirloom-audio pull
            else
              [ -f /opt/heirloom-audio/.env ] && cp /opt/heirloom-audio/.env /tmp/heirloom.env
              rm -rf /opt/heirloom-audio
              git clone https://github.com/drewdah/heirloom-audio.git /opt/heirloom-audio
              [ -f /tmp/heirloom.env ] && mv /tmp/heirloom.env /opt/heirloom-audio/.env
            fi
            cd /opt/heirloom-audio
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f
