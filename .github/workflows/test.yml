name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  NEXTAUTH_SECRET: "ci-test-secret-not-real"
  NEXTAUTH_URL: "http://localhost:3000"
  GOOGLE_CLIENT_ID: "ci-fake-client-id"
  GOOGLE_CLIENT_SECRET: "ci-fake-client-secret"
  DATABASE_URL: "file:./test.db"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: TypeScript type check
        run: npm run type-check
      - name: ESLint
        run: npm run lint

  test-unit-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Setup test database
        run: npx prisma db push --force-reset
        env:
          DATABASE_URL: file:./test.db
      - name: Run unit tests
        run: npm run test:unit
      - name: Run integration tests
        run: npm run test:integration

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test-unit-integration
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build Docker images
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml build
      - name: Start services
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
        env:
          NEXTAUTH_SECRET: ${{ env.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ env.NEXTAUTH_URL }}
          GOOGLE_CLIENT_ID: ${{ env.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ env.GOOGLE_CLIENT_SECRET }}
      - name: Wait for app health check
        run: |
          echo "Waiting for app to be healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "App is healthy after ${i}s"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "App failed to start within 60s"
              docker compose -f docker-compose.yml -f docker-compose.ci.yml logs
              exit 1
            fi
            sleep 1
          done
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
      - name: Capture Docker logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs > /tmp/docker-logs.txt 2>&1
      - name: Upload Docker logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: docker-logs
          path: /tmp/docker-logs.txt
          retention-days: 7
      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
