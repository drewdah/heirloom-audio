name: Security

# Security scans run on:
#  - Pull requests to main
#  - Release tags
#  - Weekly schedule (catch newly disclosed CVEs in existing dependencies)
#  - Manual trigger
on:
  pull_request:
    branches: [main]
  release:
    types: [created]
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9 AM UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required to upload SARIF to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      # ── npm audit ──
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # ── Install Trivy directly ──
      # Avoids the trivy-action setup issues by installing the CLI ourselves.
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      # ── Trivy scan (SARIF for GitHub Security tab) ──
      - name: Trivy vulnerability + secret scan (SARIF)
        run: |
          trivy fs . \
            --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output trivy-results.sarif \
            --ignore-unfixed \
            --skip-dirs .next,node_modules,.git,data \
            --exit-code 0

      # ── Upload to GitHub Security tab ──
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      # ── Human-readable summary in job log ──
      - name: Trivy summary (table)
        run: |
          trivy fs . \
            --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH \
            --format table \
            --ignore-unfixed \
            --skip-dirs .next,node_modules,.git,data \
            --exit-code 1
        continue-on-error: true
