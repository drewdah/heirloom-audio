name: Security

# Security scans run on:
#  - Pull requests to main
#  - Release tags
#  - Weekly schedule (catch newly disclosed CVEs in existing dependencies)
#  - Manual trigger
on:
  pull_request:
    branches: [main]
  release:
    types: [created]
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9 AM UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required to upload SARIF to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      # ── npm audit ──
      # Checks package-lock.json against the GitHub Advisory Database.
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # ── Trivy filesystem scan (SARIF for GitHub Security tab) ──
      # Scans for:
      #  - Vulnerable npm dependencies (package-lock.json)
      #  - Vulnerable Python dependencies (whisper-worker/requirements.txt)
      #  - Dockerfile misconfigurations
      #  - Accidentally committed secrets (API keys, tokens, passwords)
      - name: Trivy vulnerability + secret scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "0"
          ignore-unfixed: true
          skip-dirs: ".next,node_modules,.git,data"

      # ── Upload to GitHub Security tab ──
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      # ── Human-readable summary in job log ──
      - name: Trivy summary (table)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          skip-dirs: ".next,node_modules,.git,data"
        continue-on-error: true
