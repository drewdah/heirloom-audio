name: Build

on:
  push:
    branches: [main]

env:
  APP_IMAGE: ghcr.io/${{ github.repository }}/app
  WORKER_IMAGE: ghcr.io/${{ github.repository }}/whisper-worker

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.APP_IMAGE }}:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build & push whisper-worker
        uses: docker/build-push-action@v6
        with:
          context: ./whisper-worker
          push: true
          tags: ${{ env.WORKER_IMAGE }}:latest
          cache-from: type=gha,scope=whisper
          cache-to: type=gha,mode=max,scope=whisper
