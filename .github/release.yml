changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "New Features"
      labels:
        - feature
        - enhancement
    - title: "Bug Fixes"
      labels:
        - bug
        - fix
    - title: "Workflow & Operations"
      labels:
        - ops
        - ci
        - chore
    - title: "Other Changes"
      labels: ["*"]
